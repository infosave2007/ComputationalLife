name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
        numpy-version: ["1.26.*", "2.*"]
        exclude:
          # numpy 2 requires Python >= 3.9; pin the oldest combo to numpy 1.x.
          - python-version: "3.9"
            numpy-version: "2.*"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install "numpy==${{ matrix.numpy-version }}"

      - name: Lint
        run: ruff check complife tests

      - name: Test
        run: pytest --cov=complife --cov-report=term-missing --durations=15

  # Guarantees the headline claim of the repo: every module runs green and every
  # assertion (the "adversarial verification") passes on a clean checkout.
  run-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: python -m complife

  # Performance timeline: run the micro-benchmarks on each push to master, store
  # the results on the gh-pages branch (a live chart at
  # https://<owner>.github.io/<repo>/dev/bench/), and comment/alert on a >150%
  # regression. Runs only on master push (needs the write token; skipped on PRs).
  benchmark:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Run benchmarks
        run: python benchmarks/run_benchmarks.py > benchmark.json
      - name: Store result & track over time
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: complife micro-benchmarks
          tool: customSmallerIsBetter
          output-file-path: benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: false

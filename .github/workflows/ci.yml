name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
        numpy-version: ["1.26.*", "2.*"]
        exclude:
          # numpy 2 requires Python >= 3.9; pin the oldest combo to numpy 1.x.
          - python-version: "3.9"
            numpy-version: "2.*"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install "numpy==${{ matrix.numpy-version }}"

      - name: Lint
        run: ruff check complife tests

      - name: Test
        run: pytest --cov=complife --cov-report=term-missing

  # Guarantees the headline claim of the repo: every module runs green and every
  # assertion (the "adversarial verification") passes on a clean checkout.
  run-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: python -m complife
